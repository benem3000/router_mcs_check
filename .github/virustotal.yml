name: VirusTotal Scan

on:
  push:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: VirusTotal GitHub Action
        uses: crazy-max/ghaction-virustotal@v5.0.0
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            routermcs.sh
